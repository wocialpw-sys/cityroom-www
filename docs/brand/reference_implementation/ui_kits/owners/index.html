<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cityroom — zarządzanie najmem w Poznaniu</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="HowItWorks.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Testimonial.jsx"></script>
<script type="text/babel" src="ContactForm.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel" data-presets="react">
const App = () => {
  React.useEffect(() => {
    // (Re)initialize Lucide icons any time the tree paints.
    const run = () => window.lucide && window.lucide.createIcons();
    run();
    const obs = new MutationObserver(run);
    obs.observe(document.body, { childList: true, subtree: true });
    return () => obs.disconnect();
  }, []);
  return (
    <div data-screen-label="Owners landing">
      <Nav />
      <main>
        <Hero />
        <Stats />
        <HowItWorks />
        <Services />
        <Testimonial />
        <ContactForm />
      </main>
      <Footer />
    </div>
  );
};

// Wait for all lazy-loaded Babel scripts to populate window.
const waitFor = (names, cb) => {
  const ok = names.every(n => typeof window[n] === 'function');
  if (ok) cb();
  else setTimeout(() => waitFor(names, cb), 40);
};
waitFor(
  ['Nav','Hero','Stats','HowItWorks','Services','Testimonial','ContactForm','Footer'],
  () => ReactDOM.createRoot(document.getElementById('root')).render(<App />)
);
</script>
</body>
</html>
