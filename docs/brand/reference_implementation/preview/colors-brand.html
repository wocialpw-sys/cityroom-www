<!doctype html>
<html lang="pl"><head><meta charset="utf-8"><title>Brand color</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="eyebrow-mini">Color · brand blue</div>
  <div class="row" style="gap:8px;">
    <div class="swatch" style="background:var(--cr-blue-50);flex:1;"><span class="swatch__name">50</span><span class="swatch__hex">#eaf6fd</span></div>
    <div class="swatch" style="background:var(--cr-blue-100);flex:1;"><span class="swatch__name">100</span><span class="swatch__hex">#cfeafa</span></div>
    <div class="swatch" style="background:var(--cr-blue-200);flex:1;"><span class="swatch__name">200</span><span class="swatch__hex">#9ed5f4</span></div>
    <div class="swatch" style="background:var(--cr-blue-300);flex:1;"><span class="swatch__name">300</span><span class="swatch__hex">#5fbcea</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-blue-400);flex:1;"><span class="swatch__name">400</span><span class="swatch__hex">#2eb0e6</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-blue-500);flex:1;"><span class="swatch__name">500</span><span class="swatch__hex">#1589d4</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-blue-600);flex:1;"><span class="swatch__name">600</span><span class="swatch__hex">#0773cb</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-blue-700);flex:1;"><span class="swatch__name">700</span><span class="swatch__hex">#0861ad</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-blue-800);flex:1;"><span class="swatch__name">800</span><span class="swatch__hex">#074f8a</span></div>
  </div>
  <div class="kv" style="margin-top:4px;"><b>Usage</b> One accent moment per view. 400 → 600 is the brand gradient.</div>
</div>
</body></html>
