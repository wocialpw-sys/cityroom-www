<!doctype html>
<html lang="pl"><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="eyebrow-mini">Color · neutrals</div>
  <div class="row" style="gap:8px;">
    <div class="swatch" style="background:#fff;border:1px solid var(--border);flex:1;"><span class="swatch__name">white</span><span class="swatch__hex">#ffffff</span></div>
    <div class="swatch" style="background:var(--cr-paper);flex:1;"><span class="swatch__name">paper</span><span class="swatch__hex">#fafafa</span></div>
    <div class="swatch" style="background:var(--cr-mist);flex:1;"><span class="swatch__name">mist</span><span class="swatch__hex">#f4f5f7</span></div>
    <div class="swatch" style="background:var(--cr-line);flex:1;"><span class="swatch__name">line</span><span class="swatch__hex">#e7e9ee</span></div>
    <div class="swatch" style="background:var(--cr-line-2);flex:1;"><span class="swatch__name">line-2</span><span class="swatch__hex">#d7dae1</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-ink-50);flex:1;"><span class="swatch__name">ink-50</span><span class="swatch__hex">#9aa1ad</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-ink-30);flex:1;"><span class="swatch__name">ink-30</span><span class="swatch__hex">#6b7280</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-ink-10);flex:1;"><span class="swatch__name">ink-10</span><span class="swatch__hex">#2a2d33</span></div>
    <div class="swatch swatch--dark" style="background:var(--cr-ink);flex:1;"><span class="swatch__name">ink</span><span class="swatch__hex">#0a0b0d</span></div>
  </div>
  <div class="kv"><b>Rule</b> Page bg is <code style="font-family:var(--font-mono);">paper</code>, card bg is <code style="font-family:var(--font-mono);">white</code>, subtle fills use <code style="font-family:var(--font-mono);">mist</code>.</div>
</div>
</body></html>
