<!doctype html>
<html lang="pl"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>.sbox{width:140px;height:100px;background:#fff;border-radius:12px;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;font-family:var(--font-mono);font-size:11px;color:var(--fg3);}</style>
</head><body>
<div class="card card--paper" style="padding:36px 32px;gap:22px;">
  <div class="eyebrow-mini">Shadows · soft, never heavy</div>
  <div class="row" style="gap:22px;">
    <div class="sbox" style="box-shadow:var(--shadow-xs);">xs</div>
    <div class="sbox" style="box-shadow:var(--shadow-sm);">sm</div>
    <div class="sbox" style="box-shadow:var(--shadow-md);">md</div>
    <div class="sbox" style="box-shadow:var(--shadow-lg);">lg</div>
  </div>
  <div class="row" style="gap:22px;">
    <div class="sbox" style="box-shadow:var(--shadow-glow);background:var(--cr-gradient);color:#fff;">glow</div>
    <div style="font-size:13px;color:var(--fg3);max-width:320px;line-height:1.5;">Glow is reserved for a single hero CTA per view — it's the blue signature showing through.</div>
  </div>
</div>
</body></html>
