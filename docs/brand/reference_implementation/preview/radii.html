<!doctype html>
<html lang="pl"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">

</head><body>
<div class="card">

    <div class="rbox" style="border-radius:16px;">lg · 16</div>

    <div class="rbox" style="border-radius:999px;">pill</div>

</div>
