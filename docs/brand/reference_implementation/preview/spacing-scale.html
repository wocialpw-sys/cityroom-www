<!doctype html>
<html lang="pl"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .bar { background: var(--cr-blue-100); border-radius: 4px; height: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg3); width: 54px; text-align:right; }
  .row-sp { display:flex; align-items:center; gap: 10px; }
</style>
</head><body>
<div class="card">
  <div class="eyebrow-mini">Spacing · 4px scale</div>
  <div class="stack-8">
    <div class="row-sp"><div class="lbl">4</div><div class="bar" style="width:4px"></div></div>
    <div class="row-sp"><div class="lbl">8</div><div class="bar" style="width:8px"></div></div>
    <div class="row-sp"><div class="lbl">12</div><div class="bar" style="width:12px"></div></div>
    <div class="row-sp"><div class="lbl">16</div><div class="bar" style="width:16px"></div></div>
    <div class="row-sp"><div class="lbl">24</div><div class="bar" style="width:24px"></div></div>
    <div class="row-sp"><div class="lbl">32</div><div class="bar" style="width:32px"></div></div>
    <div class="row-sp"><div class="lbl">48</div><div class="bar" style="width:48px"></div></div>
    <div class="row-sp"><div class="lbl">64</div><div class="bar" style="width:64px"></div></div>
    <div class="row-sp"><div class="lbl">96</div><div class="bar" style="width:96px"></div></div>
    <div class="row-sp"><div class="lbl">128</div><div class="bar" style="width:128px"></div></div>
  </div>
</div>
</body></html>
